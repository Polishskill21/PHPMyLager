services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phpmylager_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:${APP_PORT:-8000}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-warehouse_storage}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD:-laravel}
      WAIT_FOR_DB: "true"
      # RUN_MIGRATIONS: "true"
      # RUN_SEEDERS: "true"
      SEEDER_PASSWORD: ${SEEDER_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - phpmylager_net

  web:
    image: nginx:1.27-alpine
    container_name: phpmylager_web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - phpmylager_net

  db:
    image: mariadb:lts
    container_name: warehouse_db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-33060}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-warehouse_storage}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - phpmylager_net

networks:
  phpmylager_net:
    driver: bridge

volumes:
  db_data: